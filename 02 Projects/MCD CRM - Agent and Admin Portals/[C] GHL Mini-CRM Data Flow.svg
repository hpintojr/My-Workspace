<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="660" fill="#ffffff"/>
  <text x="500" y="40" text-anchor="middle" font-size="22" font-weight="600" fill="#0f3b3b">Mercury Call Desk — GHL as a one-way backend for the Mini CRM</text>
  <text x="500" y="64" text-anchor="middle" font-size="13" fill="#5b6b6b">Agents only ever see the Mini CRM. GHL (and your other clients + true pricing) stays hidden.</text>

  <!-- Agents -->
  <rect x="40" y="250" width="150" height="120" rx="12" fill="#eef6f5" stroke="#1c8c84" stroke-width="2"/>
  <text x="115" y="300" text-anchor="middle" font-size="15" font-weight="600" fill="#0f3b3b">Sales Agents</text>
  <text x="115" y="324" text-anchor="middle" font-size="11" fill="#5b6b6b">1099 partners</text>
  <text x="115" y="344" text-anchor="middle" font-size="11" fill="#5b6b6b">set pricing only</text>

  <!-- Mini CRM -->
  <rect x="270" y="170" width="250" height="290" rx="14" fill="#e6f3f1" stroke="#0f766e" stroke-width="2.5"/>
  <text x="395" y="200" text-anchor="middle" font-size="16" font-weight="700" fill="#0f3b3b">Mini CRM</text>
  <text x="395" y="220" text-anchor="middle" font-size="11" fill="#5b6b6b">System of record · compliance · commissions</text>
  <rect x="295" y="240" width="200" height="60" rx="10" fill="#ffffff" stroke="#1c8c84" stroke-width="1.5"/>
  <text x="395" y="266" text-anchor="middle" font-size="13" font-weight="600" fill="#0f3b3b">Agent Portal</text>
  <text x="395" y="285" text-anchor="middle" font-size="10.5" fill="#5b6b6b">leads · calls · bookings · servicing</text>
  <rect x="295" y="315" width="200" height="60" rx="10" fill="#ffffff" stroke="#1c8c84" stroke-width="1.5"/>
  <text x="395" y="341" text-anchor="middle" font-size="13" font-weight="600" fill="#0f3b3b">Admin Portal</text>
  <text x="395" y="360" text-anchor="middle" font-size="10.5" fill="#5b6b6b">command center · ledger · audit</text>
  <rect x="295" y="390" width="200" height="50" rx="10" fill="#fff8e6" stroke="#caa23a" stroke-width="1.5"/>
  <text x="395" y="411" text-anchor="middle" font-size="11.5" font-weight="600" fill="#6b5410">Commission ledger</text>
  <text x="395" y="428" text-anchor="middle" font-size="10" fill="#6b5410">fires on FUNDED events</text>

  <!-- GHL -->
  <rect x="600" y="190" width="230" height="250" rx="14" fill="#eaf0fb" stroke="#3b5bbf" stroke-width="2.5"/>
  <text x="715" y="220" text-anchor="middle" font-size="16" font-weight="700" fill="#1c2c5b">GoHighLevel</text>
  <text x="715" y="240" text-anchor="middle" font-size="11" fill="#4a5680">backend only · sub-account per client</text>
  <rect x="625" y="258" width="180" height="48" rx="9" fill="#ffffff" stroke="#3b5bbf" stroke-width="1.3"/>
  <text x="715" y="279" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1c2c5b">Calendar / appointments</text>
  <text x="715" y="296" text-anchor="middle" font-size="10" fill="#4a5680">booked · no-show · completed</text>
  <rect x="625" y="318" width="180" height="48" rx="9" fill="#ffffff" stroke="#3b5bbf" stroke-width="1.3"/>
  <text x="715" y="339" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1c2c5b">Opportunities / invoices</text>
  <text x="715" y="356" text-anchor="middle" font-size="10" fill="#4a5680">stages · packages</text>
  <rect x="625" y="378" width="180" height="48" rx="9" fill="#ffffff" stroke="#3b5bbf" stroke-width="1.3"/>
  <text x="715" y="399" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1c2c5b">Workflow webhooks</text>
  <text x="715" y="416" text-anchor="middle" font-size="10" fill="#4a5680">push events out</text>

  <!-- Stripe -->
  <rect x="880" y="250" width="100" height="130" rx="12" fill="#efeafc" stroke="#6b46c1" stroke-width="2"/>
  <text x="930" y="305" text-anchor="middle" font-size="14" font-weight="700" fill="#3b2a6b">Stripe</text>
  <text x="930" y="326" text-anchor="middle" font-size="10" fill="#5b4a8b">inside GHL</text>
  <text x="930" y="342" text-anchor="middle" font-size="10" fill="#5b4a8b">charges &amp;</text>
  <text x="930" y="356" text-anchor="middle" font-size="10" fill="#5b4a8b">refunds</text>

  <!-- arrow markers -->
  <defs>
    <marker id="teal" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f766e"/></marker>
    <marker id="blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3b5bbf"/></marker>
    <marker id="purple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6b46c1"/></marker>
    <marker id="amber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#caa23a"/></marker>
  </defs>

  <!-- Agents <-> Mini CRM -->
  <line x1="190" y1="300" x2="268" y2="300" stroke="#0f766e" stroke-width="2.2" marker-end="url(#teal)"/>
  <line x1="268" y1="330" x2="190" y2="330" stroke="#0f766e" stroke-width="2.2" marker-end="url(#teal)"/>
  <text x="229" y="288" text-anchor="middle" font-size="10" fill="#0f766e">only surface</text>

  <!-- Agents -> GHL blocked -->
  <line x1="150" y1="250" x2="600" y2="150" stroke="#c0392b" stroke-width="2" stroke-dasharray="7 6"/>
  <circle cx="375" cy="200" r="15" fill="#fdecea" stroke="#c0392b" stroke-width="2"/>
  <line x1="367" y1="192" x2="383" y2="208" stroke="#c0392b" stroke-width="2.4"/>
  <line x1="383" y1="192" x2="367" y2="208" stroke="#c0392b" stroke-width="2.4"/>
  <text x="430" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#c0392b">No GHL access for agents</text>

  <!-- Mini CRM -> GHL (API handoff) top -->
  <path d="M520 235 C 560 215, 580 215, 600 220" fill="none" stroke="#3b5bbf" stroke-width="2.2" marker-end="url(#blue)"/>
  <text x="560" y="206" text-anchor="middle" font-size="10.5" fill="#3b5bbf">API v2 handoff →</text>
  <text x="560" y="220" text-anchor="middle" font-size="9" fill="#4a5680">create contact/opp/appt + custom fields</text>

  <!-- GHL -> Mini CRM (webhooks events) middle -->
  <path d="M600 330 C 565 345, 545 345, 520 340" fill="none" stroke="#3b5bbf" stroke-width="2.2" marker-end="url(#blue)"/>
  <text x="560" y="372" text-anchor="middle" font-size="10.5" fill="#3b5bbf">← Webhooks: appts · stages · invoices</text>

  <!-- Stripe -> GHL -->
  <line x1="880" y1="315" x2="832" y2="315" stroke="#6b46c1" stroke-width="2.2" marker-end="url(#purple)"/>
  <text x="855" y="305" text-anchor="middle" font-size="9.5" fill="#6b46c1">native</text>

  <!-- GHL -> Mini CRM funding relay (bottom long) -->
  <path d="M715 440 C 715 510, 395 510, 395 442" fill="none" stroke="#caa23a" stroke-width="2.4" marker-end="url(#amber)"/>
  <text x="555" y="528" text-anchor="middle" font-size="11.5" font-weight="600" fill="#8a6d12">Funding relay: FUNDED · FAILED · REFUND · DISPUTE  →  commission ledger</text>
  <text x="555" y="546" text-anchor="middle" font-size="10" fill="#8a6d12">every recurring charge fires its own event · idempotent · Finance approves payout</text>

  <text x="500" y="620" text-anchor="middle" font-size="11" fill="#5b6b6b">Stripe → GHL → Mini CRM keeps Stripe untouched in v1. Agents are attributed via GHL custom fields, not GHL logins.</text>
</svg>
