<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="660" fill="#ffffff"/>
  <text x="500" y="34" text-anchor="middle" font-size="20" font-weight="600" fill="#0f3b3b">Demo booking flow — agent books through the app, you host the Meet</text>
  <text x="500" y="56" text-anchor="middle" font-size="12" fill="#5b6b6b">Free Gmail (mcd@gmail) hosts the calendar + Google Meet · agents never log into Gmail or GHL</text>

  <!-- actor headers -->
  <g font-size="12" font-weight="600">
    <rect x="38" y="80" width="150" height="44" rx="9" fill="#eef6f5" stroke="#1c8c84" stroke-width="1.8"/>
    <text x="113" y="100" text-anchor="middle" fill="#0f3b3b">Agent</text>
    <text x="113" y="116" text-anchor="middle" font-size="10" font-weight="400" fill="#5b6b6b">in the Mini CRM</text>
    <rect x="258" y="80" width="150" height="44" rx="9" fill="#e6f3f1" stroke="#0f766e" stroke-width="1.8"/>
    <text x="333" y="100" text-anchor="middle" fill="#0f3b3b">Mini CRM</text>
    <text x="333" y="116" text-anchor="middle" font-size="10" font-weight="400" fill="#5b6b6b">app · holds GHL token</text>
    <rect x="470" y="80" width="150" height="44" rx="9" fill="#eaf0fb" stroke="#3b5bbf" stroke-width="1.8"/>
    <text x="545" y="100" text-anchor="middle" fill="#1c2c5b">GoHighLevel</text>
    <text x="545" y="116" text-anchor="middle" font-size="10" font-weight="400" fill="#4a5680">calendar · workflow</text>
    <rect x="676" y="80" width="150" height="44" rx="9" fill="#fdeeea" stroke="#c0633a" stroke-width="1.8"/>
    <text x="751" y="98" text-anchor="middle" fill="#7a3a1c">Google · mcd@gmail</text>
    <text x="751" y="115" text-anchor="middle" font-size="10" font-weight="400" fill="#8a5a3c">Calendar + Meet host</text>
    <rect x="858" y="80" width="138" height="44" rx="9" fill="#f1eafc" stroke="#6b46c1" stroke-width="1.8"/>
    <text x="927" y="98" text-anchor="middle" fill="#3b2a6b">Invitees</text>
    <text x="927" y="115" text-anchor="middle" font-size="10" font-weight="400" fill="#5b4a8b">host · agent · client</text>
  </g>

  <!-- lifelines -->
  <g stroke="#c7d2d0" stroke-width="1.4" stroke-dasharray="4 5">
    <line x1="113" y1="124" x2="113" y2="610"/>
    <line x1="333" y1="124" x2="333" y2="610"/>
    <line x1="545" y1="124" x2="545" y2="610"/>
    <line x1="751" y1="124" x2="751" y2="610"/>
    <line x1="927" y1="124" x2="927" y2="610"/>
  </g>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#33474a"/></marker>
  </defs>

  <g font-size="11" fill="#23383a">
    <!-- 1 -->
    <line x1="113" y1="170" x2="331" y2="170" stroke="#33474a" stroke-width="1.8" marker-end="url(#ah)"/>
    <text x="222" y="162" text-anchor="middle">1 · Book demo: pick time + client email</text>
    <text x="222" y="184" text-anchor="middle" font-size="9.5" fill="#5b6b6b">agent auto-attached as guest</text>
    <!-- 2 -->
    <line x1="333" y1="230" x2="543" y2="230" stroke="#33474a" stroke-width="1.8" marker-end="url(#ah)"/>
    <text x="438" y="222" text-anchor="middle">2 · API v2: create appointment on mcd calendar</text>
    <text x="438" y="244" text-anchor="middle" font-size="9.5" fill="#5b6b6b">add agent as guest · stamp custom fields</text>
    <!-- 3 -->
    <line x1="545" y1="290" x2="749" y2="290" stroke="#33474a" stroke-width="1.8" marker-end="url(#ah)"/>
    <text x="648" y="282" text-anchor="middle">3 · Create event + Meet link</text>
    <text x="648" y="304" text-anchor="middle" font-size="9.5" fill="#5b6b6b">unique Google Meet generated</text>
    <!-- 4 -->
    <line x1="751" y1="350" x2="925" y2="350" stroke="#33474a" stroke-width="1.8" marker-end="url(#ah)"/>
    <text x="838" y="342" text-anchor="middle">4 · Invite + Meet link</text>
    <text x="838" y="364" text-anchor="middle" font-size="9.5" fill="#5b6b6b">host · agent · client</text>
    <!-- 5 self loop on GHL -->
    <path d="M545 400 h70 v34 h-70" fill="none" stroke="#3b5bbf" stroke-width="1.8" marker-end="url(#ah)"/>
    <text x="625" y="412" text-anchor="start" fill="#1c2c5b">5 · Workflow: create Opportunity</text>
    <text x="625" y="430" text-anchor="start" font-size="9.5" fill="#4a5680">+ run post-booking automation</text>
    <!-- 6 webhook back -->
    <line x1="545" y1="478" x2="335" y2="478" stroke="#caa23a" stroke-width="2" marker-end="url(#ah)"/>
    <text x="440" y="470" text-anchor="middle" fill="#8a6d12">6 · Webhook APPOINTMENT_BOOKED</text>
    <text x="440" y="492" text-anchor="middle" font-size="9.5" fill="#8a6d12">Mini CRM: DEMO_BOOKED · store ghl_* IDs</text>
  </g>

  <rect x="40" y="525" width="920" height="62" rx="10" fill="#f5faf9" stroke="#cfe0dd" stroke-width="1.2"/>
  <text x="500" y="550" text-anchor="middle" font-size="11.5" font-weight="600" fill="#0f3b3b">The app is the only thing that "acts as you" — it holds the GHL token server-side.</text>
  <text x="500" y="570" text-anchor="middle" font-size="11" fill="#5b6b6b">Never share the mcd@gmail password. mcd@gmail hosts the Meet; agent + client are guests. Agent identity rides on custom fields, not a GHL login.</text>
</svg>
